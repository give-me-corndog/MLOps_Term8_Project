<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MLOps Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  /* ── Reset & tokens ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f0e;
    --surface:   #181817;
    --border:    #2a2a27;
    --muted:     #4a4a44;
    --text:      #e8e4d9;
    --subdued:   #8a8578;
    --accent:    #c8a96e;
    --accent-dim:#7a6540;
    --good:      #6db38a;
    --bad:       #c86e6e;
    --bubble-u:  #1e1e1c;
    --bubble-a:  #19201a;
    --radius:    10px;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-serif:'Fraunces', Georgia, serif;
  }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-title {
    font-family: var(--font-serif);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .logo-sub {
    font-size: 0.65rem;
    color: var(--subdued);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .status-pill {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--subdued);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
    transition: border-color .3s;
  }

  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }

  .status-pill.active .dot { background: var(--good); }
  .status-pill.active { border-color: var(--accent-dim); color: var(--accent); }

  .btn-ghost {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--subdued);
    cursor: pointer;
    transition: all .2s;
  }

  .btn-ghost:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  /* ── Layout split ───────────────────────────────────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────────────────────────────────────── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    padding: 20px 16px;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-section-title {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* drop zone */
  .drop-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    font-size: 0.72rem;
    color: var(--subdued);
    line-height: 1.6;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent-dim);
    background: rgba(200,169,110,.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
  }

  .drop-icon {
    font-size: 1.4rem;
    display: block;
    margin-bottom: 6px;
    opacity: 0.5;
  }

  /* file list */
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    animation: slide-in .25s ease;
  }

  .file-item .file-icon { color: var(--accent); }
  .file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .file-chunks { color: var(--subdued); flex-shrink: 0; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sidebar-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: auto;
  }

  .btn-accent {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--accent-dim);
    background: rgba(200,169,110,.08);
    color: var(--accent);
    cursor: pointer;
    width: 100%;
    transition: all .2s;
  }

  .btn-accent:hover:not(:disabled) {
    background: rgba(200,169,110,.16);
  }

  .btn-accent:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-danger {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    width: 100%;
    transition: all .2s;
  }

  .btn-danger:hover {
    border-color: var(--bad);
    color: var(--bad);
  }

  /* ── Chat area ──────────────────────────────────────────────────────────── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }

  .empty-state .big-letter {
    font-family: var(--font-serif);
    font-size: 5rem;
    font-weight: 300;
    font-style: italic;
    color: var(--border);
    line-height: 1;
  }

  .empty-state p {
    font-size: 0.75rem;
    line-height: 1.7;
    max-width: 300px;
  }

  /* messages */
  .msg {
    display: flex;
    gap: 12px;
    animation: msg-in .22s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { justify-content: flex-end; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: var(--accent-dim);
    color: var(--accent);
    order: 2;
  }

  .msg.assistant .msg-avatar {
    background: #1a2b1e;
    color: var(--good);
  }

  .msg-body {
    max-width: 72%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.82rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--bubble-u);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg.assistant .bubble {
    background: var(--bubble-a);
    border: 1px solid #1e2e20;
    color: var(--text);
  }

  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .source-tag {
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(200,169,110,.08);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
  }

  /* thinking dots */
  .thinking .bubble {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
  }

  .dot-pulse span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--good);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot-pulse span:nth-child(2) { animation-delay: .2s; }
  .dot-pulse span:nth-child(3) { animation-delay: .4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: .2; transform: scale(.8); }
    40%           { opacity: 1;  transform: scale(1); }
  }

  /* ── Input bar ──────────────────────────────────────────────────────────── */
  .input-bar {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  #question-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 11px 16px;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    outline: none;
    line-height: 1.5;
    transition: border-color .2s;
    overflow-y: auto;
  }

  #question-input:focus { border-color: var(--accent-dim); }
  #question-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: var(--radius);
    border: 1px solid var(--accent-dim);
    background: rgba(200,169,110,.1);
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
    font-size: 1rem;
  }

  #send-btn:hover:not(:disabled) { background: rgba(200,169,110,.2); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Toast ──────────────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px; right: 28px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 10px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    max-width: 300px;
    z-index: 999;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: var(--bad); color: var(--bad); }
  #toast.success { border-color: var(--good); color: var(--good); }

  /* ── Scrollbar global ───────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">RAGent</span>
    <span class="logo-sub">Chat</span>
  </div>
  <div class="header-right">
    <div class="status-pill" id="status-pill">
      <span class="dot"></span>
      <span id="status-text">0 chunks</span>
    </div>
    <button class="btn-ghost" onclick="refreshStatus()">↻ Refresh</button>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div>
      <p class="sidebar-section-title">Upload PDFs</p>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf" multiple />
        <span class="drop-icon">⬆</span>
        Drop PDFs here<br/>or click to browse
      </div>
    </div>

    <div>
      <p class="sidebar-section-title">Ingested Files</p>
      <div class="file-list" id="file-list">
        <span style="font-size:.68rem;color:var(--muted)">No files yet.</span>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn-accent" id="ingest-btn" onclick="ingestFiles()" disabled>
        ⚡ Ingest Selected
      </button>
      <button class="btn-danger" onclick="clearStore()">
        ✕ Clear Vector Store
      </button>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <span class="big-letter">?</span>
        <p>Upload and ingest PDF documents,<br/>then ask questions about their contents.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="question-input" rows="1"
          placeholder="Ask a question about your documents…"></textarea>
      </div>
      <button id="send-btn" onclick="sendQuestion()" title="Send">
        ➤
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = "";   // same origin; change to "http://localhost:5000" if serving separately
  let pendingFiles = [];
  let isThinking = false;

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  const textarea = document.getElementById("question-input");
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + "px";
  });
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  // ── Drag & drop ──────────────────────────────────────────────────────────
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    handleFiles([...e.dataTransfer.files].filter(f => f.name.endsWith(".pdf")));
  });
  fileInput.addEventListener("change", () => {
    handleFiles([...fileInput.files]);
    fileInput.value = "";
  });

  function handleFiles(files) {
    if (!files.length) return;
    pendingFiles = [...pendingFiles, ...files];
    renderPendingFiles();
    document.getElementById("ingest-btn").disabled = false;
  }

  function renderPendingFiles() {
    const list = document.getElementById("file-list");
    if (!pendingFiles.length) {
      list.innerHTML = `<span style="font-size:.68rem;color:var(--muted)">No files yet.</span>`;
      return;
    }
    list.innerHTML = pendingFiles.map(f => `
      <div class="file-item">
        <span class="file-icon">⬜</span>
        <span class="file-name" title="${f.name}">${f.name}</span>
        <span class="file-chunks" style="color:var(--muted)">pending</span>
      </div>`).join("");
  }

  // ── Ingest ───────────────────────────────────────────────────────────────
  async function ingestFiles() {
    if (!pendingFiles.length) return;
    const btn = document.getElementById("ingest-btn");
    btn.disabled = true;
    btn.textContent = "⏳ Ingesting…";

    const formData = new FormData();
    pendingFiles.forEach(f => formData.append("files", f));

    try {
      const res = await fetch(`${API}/api/ingest`, { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Ingestion failed");

      // Render results
      const list = document.getElementById("file-list");
      list.innerHTML = data.ingested.map(item => `
        <div class="file-item">
          <span class="file-icon" style="color:var(--good)">✔</span>
          <span class="file-name" title="${item.file}">${item.file}</span>
          <span class="file-chunks">${item.chunks}c</span>
        </div>`).join("");

      pendingFiles = [];
      btn.textContent = "⚡ Ingest Selected";
      showToast(`Ingested ${data.ingested.length} file(s).`, "success");
      refreshStatus();
    } catch (err) {
      btn.textContent = "⚡ Ingest Selected";
      btn.disabled = false;
      showToast(err.message, "error");
    }
  }

  // ── Clear ────────────────────────────────────────────────────────────────
  async function clearStore() {
    if (!confirm("This will wipe all ingested data. Continue?")) return;
    try {
      await fetch(`${API}/api/clear`, { method: "POST" });
      document.getElementById("file-list").innerHTML =
        `<span style="font-size:.68rem;color:var(--muted)">No files yet.</span>`;
      pendingFiles = [];
      document.getElementById("ingest-btn").disabled = true;
      showToast("Vector store cleared.", "success");
      refreshStatus();
    } catch (err) {
      showToast("Clear failed.", "error");
    }
  }

  // ── Status ───────────────────────────────────────────────────────────────
  async function refreshStatus() {
    try {
      const res = await fetch(`${API}/api/status`);
      const data = await res.json();
      const pill = document.getElementById("status-pill");
      const txt  = document.getElementById("status-text");
      txt.textContent = `${data.chunk_count} chunk${data.chunk_count !== 1 ? "s" : ""}`;
      pill.classList.toggle("active", data.chunk_count > 0);
    } catch {}
  }

  // ── Chat ─────────────────────────────────────────────────────────────────
  async function sendQuestion() {
    if (isThinking) return;
    const input = document.getElementById("question-input");
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("send-btn").disabled = true;
    isThinking = true;

    hideEmpty();
    appendMessage("user", question);

    const thinkId = appendThinking();

    try {
      const res = await fetch(`${API}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeThinking(thinkId);

      if (!res.ok) throw new Error(data.error || "Unknown error");
      appendMessage("assistant", data.answer, data.sources || []);
    } catch (err) {
      removeThinking(thinkId);
      appendMessage("assistant", `⚠ ${err.message}`, []);
    }

    document.getElementById("send-btn").disabled = false;
    isThinking = false;
  }

  function hideEmpty() {
    const e = document.getElementById("empty-state");
    if (e) e.style.display = "none";
  }

  function appendMessage(role, text, sources = []) {
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === "user" ? "YOU" : "AI"}</div>
      <div class="msg-body">
        <div class="bubble">${escHtml(text)}</div>
        ${sources.length ? `<div class="sources">${sources.map(s =>
          `<span class="source-tag">${escHtml(s)}</span>`).join("")}</div>` : ""}
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  let thinkCounter = 0;
  function appendThinking() {
    const id = "think-" + (++thinkCounter);
    const container = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg assistant thinking";
    div.id = id;
    div.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="bubble">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    document.getElementById(id)?.remove();
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
              .replace(/\n/g,"<br>");
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = "") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ""; }, 3000);
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  refreshStatus();
</script>
</body>
</html>
